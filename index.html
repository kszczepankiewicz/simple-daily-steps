<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Daily Steps</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <form><label for="day">Day: </label><input type="number" name="day" id="day"><label for="steps">Steps:
            </label><input type="number" name="steps" id="steps">
            <button type="submit">Add</button>

        </form>
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Steps</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </main>
    <script src="script.js"></script>

</body>

</html>
